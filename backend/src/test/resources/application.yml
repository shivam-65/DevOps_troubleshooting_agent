server:
  port: 0

spring:
  application:
    name: incident-commander-backend-test
  datasource:
    url: jdbc:h2:mem:incidentdb-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

logging:
  level:
    root: WARN
    com.devops.incident: INFO

# Point external services to an unused port so async calls fail fast and deterministically.
ai-service:
  base-url: http://localhost:59999
  timeout:
    connect: 1s
    read: 2s
  retry:
    max-attempts: 1
    backoff: 50ms

adapters:
  mode: simulator
  simulator:
    base-url: http://localhost:59998

app:
  callback-base-url: http://localhost:8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
