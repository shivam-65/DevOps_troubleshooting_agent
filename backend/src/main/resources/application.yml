server:
  port: 8080

spring:
  application:
    name: incident-commander-backend

  datasource:
    url: jdbc:h2:mem:incidentdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
    date-format: com.fasterxml.jackson.databind.util.StdDateFormat

logging:
  level:
    root: INFO
    com.devops.incident: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# --- External Services ---
ai-service:
  base-url: http://localhost:8000
  timeout:
    connect: 5s
    read: 300s
  retry:
    max-attempts: 3
    backoff: 1s

# --- Adapter Configuration ---
adapters:
  mode: simulator         # simulator | real
  simulator:
    base-url: http://localhost:8001
  real:
    kubernetes:
      kubeconfig: ${KUBECONFIG:~/.kube/config}
    logs:
      elasticsearch-url: ${ELASTICSEARCH_URL:http://localhost:9200}
    metrics:
      prometheus-url: ${PROMETHEUS_URL:http://localhost:9090}
    git:
      provider: github
      token: ${GIT_TOKEN:}

# --- API Documentation ---
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method

# --- Pagination Defaults ---
pagination:
  default-page-size: 20
  max-page-size: 100

# --- CORS ---
cors:
  allowed-origins: http://localhost:3000,http://localhost:5173,http://localhost:5174,http://localhost:5175
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true

# --- Actuator ---
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
